name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"

jobs:
  test:
    name: Tests
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Run local tests
        run: ./tests/run.sh

      - name: Check Homebrew cask syntax
        run: ruby -c Casks/cbonsai-saver.rb

  build:
    name: Release build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            release_version: 1.1.6
            runner: macos-15
            artifact: cbonsai-saver-1.1.6.zip
            brew_packages: pkgconf
          - arch: x86_64
            release_version: 1.1.4x
            runner: macos-15-intel
            artifact: cbonsai-saver-1.1.4x-x86_64-macos10.15.zip
            brew_packages: pkgconf
    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Install build dependencies
        run: brew install ${{ matrix.brew_packages }}

      - name: Build release archive
        run: ./scripts/package-release.sh "${{ matrix.release_version }}" "${{ matrix.arch }}"

      - name: Show release archive checksum
        run: shasum -a 256 "build/release/artifacts/${{ matrix.artifact }}"
