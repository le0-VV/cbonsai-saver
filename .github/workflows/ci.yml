name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"

jobs:
  test:
    name: Tests
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Run local tests
        run: ./tests/run.sh

      - name: Check Homebrew formula syntax
        run: ruby -c Formula/cbonsai-saver.rb

  build:
    name: Release build
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Install build dependencies
        run: brew install ncurses pkgconf

      - name: Build release archive
        run: ./scripts/package-release.sh 1.0

      - name: Show release archive checksum
        run: shasum -a 256 build/release/artifacts/cbonsai-saver-1.0.zip
